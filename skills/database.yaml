id: database
name: Database System
category: core
description: Dynamic database operations including queries (fetchAll, fetchById, search, pagination, aggregation), mutations (insert, update, delete, upsert, bulk operations), realtime subscriptions, filter operators, retry logic, and timeout handling.
intent:
  what: Provides all database CRUD operations, query composition, realtime subscriptions, and data aggregation for any Supabase table.
  why: Enables schema-agnostic database operations with built-in caching, validation, retry logic, and automatic cache invalidation without hardcoded table or column names.
inputs:
  - name: table
    type: string
    required: true
    description: Target table name (schema-agnostic)
  - name: data
    type: Record<string, unknown>
    required: true
    description: Record data for insert/update operations
  - name: filters
    type: FilterCondition[]
    required: false
    description: Array of filter conditions for query operations
  - name: options
    type: QueryOptions | MutationOptions
    required: false
    description: Configuration for caching, pagination, timeout, retries, validation
  - name: subscriptionConfig
    type: SubscriptionConfig
    required: false
    description: Table, event type, and filter for realtime subscriptions
outputs:
  type: QueryResult | MutationResult | PaginatedResult | AggregateResult | SubscriptionHandle
  description: Query results with data and count, mutation results, paginated data, aggregate computations, or realtime subscription handles
usage:
  steps:
    - Ensure Supabase client is initialized before any database operation
    - Use fetchAll/fetchWhere for queries with filters
    - Use fetchPaginated for paginated results with automatic page size validation
    - Use mutation functions (insertOne, updateById, etc.) with optional validation
    - Use subscribeToTable for realtime change notifications
    - All mutations automatically invalidate related cache entries
  examples:
    - description: Query with filters, sorting, and pagination
      code: |
        import { fetchPaginated, fetchWhere, count } from '@/lib'

        // Paginated query with filters
        const result = await fetchPaginated('users', {
          page: 1,
          pageSize: 20,
          filters: [
            { column: 'status', operator: 'eq', value: 'active' },
            { column: 'age', operator: 'gte', value: 18 },
          ],
          orderBy: [{ column: 'created_at', ascending: false }],
          useCache: true,
          ttl: 60000,
        })

        // Count matching records
        const total = await count('users', [
          { column: 'status', operator: 'eq', value: 'active' },
        ])
    - description: Mutation with validation and automatic cache invalidation
      code: |
        import { z, insertOne, updateById, deleteById, bulkUpdate } from '@/lib'

        const userSchema = z.object({
          name: z.string().min(2),
          email: z.string().email(),
          role: z.enum(['admin', 'member']).optional(),
        })

        // Insert with Zod validation
        const newUser = await insertOne('users', {
          name: 'John',
          email: 'john@example.com',
          role: 'member',
        }, {
          validate: userSchema,
          timeout: 5000,
          retries: 2,
        })

        // Bulk update
        await bulkUpdate('users', [
          { id: '1', data: { status: 'active' } },
          { id: '2', data: { status: 'inactive' } },
        ])
    - description: Realtime subscription
      code: |
        import { subscribeToTable, unsubscribe } from '@/lib'

        const subscription = subscribeToTable('orders', {
          onInsert: (order) => console.log('New order:', order),
          onUpdate: (order) => console.log('Updated order:', order),
          onDelete: (order) => console.log('Deleted order:', order),
          onError: (error) => console.error('Subscription error:', error),
        })

        // Cleanup
        await unsubscribe(subscription)
logic:
  summary: Database operations use the Supabase client to execute queries and mutations. Queries support caching with automatic key derivation, retry logic with exponential backoff, and timeout handling. Mutations automatically invalidate related cache entries. Realtime subscriptions use Supabase channels for Postgres change notifications, broadcasts, and presence tracking.
  flow:
    - step: 1
      action: Client retrieval
      detail: getSupabaseClient() returns Supabase instance for table operations
    - step: 2
      action: Input validation
      detail: If validate option provided, validateInput() checks data against Zod schema
    - step: 3
      action: Query building
      detail: Apply filters (eq, neq, gt, etc.), sorting, and pagination to query
    - step: 4
      action: Cache check
      detail: For queries, derive cache key and check QueryCache for existing result
    - step: 5
      action: Execution with retry
      detail: Execute query/mutation with withRetry() wrapper for transient error handling
    - step: 6
      action: Timeout handling
      detail: AbortController cancels operation if timeout exceeded
    - step: 7
      action: Cache update
      detail: For queries, store result in cache; for mutations, invalidate table cache
    - step: 8
      action: Result return
      detail: Return normalized result with data, error, and count fields
constraints:
  rules:
    - All table names must be strings without hardcoded domain assumptions
    - Maximum page size is 100 records (DATABASE.PAGINATION.MAX_PAGE_SIZE)
    - Default timeout is 10 seconds (DATABASE.DEFAULT_TIMEOUT)
    - Default retries is 2 for queries, 0 for mutations
    - Mutations always invalidate cache for affected table unless invalidateCache is false
    - Retry only applies to transient errors (network, timeout, 5xx, 429)
    - Soft delete requires deleted_at column on table
  anti_patterns:
    - Do not hardcode table names or column names in reusable code
    - Do not exceed MAX_PAGE_SIZE (100) in pagination
    - Do not skip validation when accepting user input
    - Do not bypass cache invalidation after mutations
    - Do not use retry for non-idempotent mutations without caution
    - Do not leave realtime subscriptions active without cleanup
    - Do not use select('*') when specific columns are sufficient
dependencies:
  internal:
    - architecture
    - cache
    - utilities
    - constants
  external:
    - '@supabase/supabase-js'
    - zod
code_mapping:
  files:
    - src/lib/database/queries.ts
    - src/lib/database/mutations.ts
    - src/lib/database/realtime.ts
    - src/lib/database/index.ts
    - src/lib/database/client.ts
    - src/lib/cache/cache.ts
    - src/lib/cache/keys.ts
    - src/lib/utils/retry.ts
    - src/lib/utils/validate.ts
    - src/lib/utils/errors.ts
  functions:
    - name: fetchAll
      signature: '<T extends GenericRow>(table: string, options?: QueryOptions) => Promise<{ data: T[] | null; error: Error | null; count: number }>'
      description: Fetches all records matching criteria with caching support
    - name: fetchById
      signature: '<T extends GenericRow>(table: string, id: string | number, options?) => Promise<{ data: T | null; error: Error | null }>'
      description: Fetches single record by ID
    - name: fetchWhere
      signature: '<T extends GenericRow>(table: string, filters: FilterCondition[], options?) => Promise<{ data: T[] | null; error: Error | null; count: number }>'
      description: Fetches records matching filter conditions
    - name: fetchPaginated
      signature: '<T extends GenericRow>(table: string, options?: PaginatedQueryOptions) => Promise<PaginatedResult<T>>'
      description: Fetches paginated results with page size validation
    - name: search
      signature: '<T extends GenericRow>(table: string, column: string, query: string, options?) => Promise<{ data: T[] | null; error: Error | null; count: number }>'
      description: ILIKE search on specified column
    - name: fullTextSearch
      signature: '<T extends GenericRow>(table: string, column: string, query: string, options?) => Promise<{ data: T[] | null; error: Error | null; count: number }>'
      description: PostgreSQL full-text search using textSearch
    - name: count
      signature: (table: string, filters?: FilterCondition[]) => Promise<number>
      description: Counts records matching filters
    - name: exists
      signature: (table: string, filters: FilterCondition[]) => Promise<boolean>
      description: Checks if any record matches filters
    - name: distinct
      signature: '<T extends GenericRow>(table: string, columns: string, options?) => Promise<{ data: T[] | null; error: Error | null; count: number }>'
      description: Gets distinct values with RPC fallback for PostgREST compatibility
    - name: aggregate
      signature: (table: string, options?: { count?: boolean; sum?: string[]; avg?: string[]; min?: string[]; max?: string[]; filters?: FilterCondition[] }) => Promise<AggregateResult>
      description: Computes aggregate functions (sum, avg, min, max) on columns
    - name: createQuery
      signature: '<T extends GenericRow>(table: string, baseOptions?: QueryOptions) => Promise<FluentQueryBuilder>'
      description: Creates fluent query builder with filters, sort, paginate, execute methods
    - name: insertOne
      signature: '<T>(table: string, data: Record<string, unknown>, options?: MutationOptions) => Promise<T>'
      description: Inserts single record with optional validation and cache invalidation
    - name: insertMany
      signature: '<T>(table: string, data: Record<string, unknown>[], options?: MutationOptions) => Promise<T[]>'
      description: Inserts multiple records
    - name: updateById
      signature: '<T>(table: string, id: string, data: Record<string, unknown>, options?: MutationOptions) => Promise<T>'
      description: Updates record by ID
    - name: updateWhere
      signature: '<T>(table: string, conditions: Record<string, unknown>, data: Record<string, unknown>, options?: MutationOptions) => Promise<T[]>'
      description: Updates records matching conditions
    - name: upsert
      signature: '<T>(table: string, data: Record<string, unknown>, options?: MutationOptions & { onConflict?: string }) => Promise<T>'
      description: Inserts or updates based on conflict
    - name: deleteById
      signature: (table: string, id: string, options?: MutationOptions) => Promise<void>
      description: Deletes record by ID
    - name: deleteWhere
      signature: (table: string, conditions: Record<string, unknown>, options?: MutationOptions) => Promise<number>
      description: Deletes records matching conditions, returns count
    - name: deleteMany
      signature: (table: string, ids: string[], options?: MutationOptions) => Promise<void>
      description: Deletes records by ID array
    - name: softDelete
      signature: '<T>(table: string, id: string, options?: MutationOptions) => Promise<T>'
      description: Sets deleted_at timestamp for soft deletion
    - name: restore
      signature: '<T>(table: string, id: string, options?: MutationOptions) => Promise<T>'
      description: Clears deleted_at to restore soft-deleted record
    - name: bulkInsert
      signature: '<T>(table: string, items: Record<string, unknown>[], options?: MutationOptions) => Promise<T[]>'
      description: Bulk inserts multiple records
    - name: bulkUpdate
      signature: '<T>(table: string, items: { id: string; data: Record<string, unknown> }[], options?: MutationOptions) => Promise<T[]>'
      description: Bulk updates multiple records by ID
    - name: runSequential
      signature: '<T>(table: string, operations: Array<() => Promise<T>>, options?: MutationOptions) => Promise<T[]>'
      description: Executes operations sequentially with cache invalidation
    - name: subscribeToTable
      signature: '<T extends Record<string, unknown>>(config: SubscriptionConfig, callbacks: SubscriptionCallbacks<T>) => SubscriptionHandle'
      description: Subscribes to table change events (INSERT, UPDATE, DELETE)
    - name: subscribeToTables
      signature: '<T extends Record<string, unknown>>(configs: Array<{ config: SubscriptionConfig; callbacks: SubscriptionCallbacks<T> }>) => Array<SubscriptionHandle>'
      description: Creates multiple table subscriptions
    - name: createBroadcastChannel
      signature: (channelName: string) => { subscribe: Function; send: Function; unsubscribe: Function }
      description: Creates broadcast channel for cross-tab communication
    - name: createPresenceChannel
      signature: (channelName: string) => { subscribe: Function; untrack: Function; unsubscribe: Function }
      description: Creates presence channel for user tracking
    - name: unsubscribe
      signature: (handle: SubscriptionHandle | RealtimeChannel) => Promise<void>
      description: Unsubscribes from specific channel
    - name: unsubscribeAll
      signature: () => Promise<void>
      description: Unsubscribes from all active channels
ai_instructions:
  when_to_use:
    - When reading, creating, updating, or deleting records from any table
    - When implementing search or filtering functionality
    - When building paginated list views
    - When computing aggregates (sum, avg, min, max)
    - When implementing realtime data synchronization
    - When bulk operations are needed for performance
  when_not_to_use:
    - When handling authentication (use auth skill)
    - When uploading or downloading files (use storage skill)
    - When implementing caching strategy directly (use cache skill)
    - When domain-specific business logic is required (implement separately)
    - When using raw SQL (this system uses PostgREST API only)
  reasoning_steps:
    - Identify operation type (query vs mutation vs realtime)
    - For queries: determine if caching is needed, set appropriate TTL
    - For mutations: determine if validation is needed, define Zod schema
    - Choose appropriate filter operators for query conditions
    - Set timeout and retries based on operation criticality
    - For pagination: validate page size does not exceed MAX_PAGE_SIZE
    - For realtime: plan subscription cleanup to avoid memory leaks
    - For bulk operations: consider transaction boundaries and error handling
    - Always handle errors through the typed error system
metadata:
  complexity: high
  stability: stable
