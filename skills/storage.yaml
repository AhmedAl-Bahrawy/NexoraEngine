id: storage
name: Storage System
category: core
description: Generic file operations for any Supabase storage bucket including uploads, downloads, URL generation, file management, and validation.
intent:
  what: Provides file upload, download, URL generation, and management operations for Supabase storage buckets without hardcoded bucket names or file types.
  why: Enables secure file operations with type validation, size limits, progress callbacks, signed URLs for private files, and automatic cleanup.
inputs:
  - name: bucket
    type: string
    required: true
    description: Target storage bucket name
  - name: path
    type: string
    required: true
    description: File path within the bucket
  - name: file
    type: File | Blob
    required: true
    description: File or Blob to upload
  - name: options
    type: UploadOptions
    required: false
    description: Upload configuration including upsert, contentType, cacheControl, timeout, retries
outputs:
  type: UploadResult | Blob | StorageObject[] | string | FileMetadata | void
  description: Upload results with path and URL, downloaded blobs, file listings, signed URLs, or file metadata
usage:
  steps:
    - Validate file type and size before upload
    - Use uploadFile for basic uploads or uploadWithValidation for custom validation
    - Use getSignedUrl for temporary access to private files
    - Use getPublicUrl for permanent access to public files
    - Use deleteFile/deleteFiles for cleanup
    - Always handle errors through the typed error system
  examples:
    - description: Upload image with validation
      code: |
        import { uploadImage, getSignedUrl, deleteFile } from '@/lib'

        // Upload with validation
        const result = await uploadImage('avatars', 'user-123/avatar.jpg', file, {
          upsert: true,
          cacheControl: '3600',
          onProgress: (percent) => console.log(`Upload: ${percent}%`),
        })

        // Get signed URL for private access
        const signedUrl = await getSignedUrl('avatars', 'user-123/avatar.jpg', 3600)

        // Delete when no longer needed
        await deleteFile('avatars', 'user-123/avatar.jpg')
    - description: Upload with custom validation
      code: |
        import { uploadWithValidation } from '@/lib'

        const result = await uploadWithValidation('documents', `users/${userId}/contract.pdf`, file, {
          maxSize: 10 * 1024 * 1024, // 10MB
          allowedTypes: ['application/pdf'],
        }, {
          upsert: false,
          contentType: 'application/pdf',
        })
logic:
  summary: Storage operations use the Supabase storage client to interact with buckets. Files are validated before upload using MIME type and size checks. Signed URLs are generated for temporary access to private files. All operations support retry logic and timeout handling for resilience.
  flow:
    - step: 1
      action: Client retrieval
      detail: getSupabaseClient() returns Supabase instance with storage access
    - step: 2
      action: Validation
      detail: validateFile() checks file type and size against allowed values
    - step: 3
      action: Upload execution
      detail: supabase.storage.from(bucket).upload() with options
    - step: 4
      action: Progress tracking
      detail: onProgress callback receives upload percentage if provided
    - step: 5
      action: URL generation
      detail: getPublicUrl() for permanent access, createSignedUrl() for temporary
    - step: 6
      action: Error handling
      detail: All errors normalized through handleSupabaseError()
constraints:
  rules:
    - Bucket names must be strings without hardcoded domain assumptions
    - Maximum file size is configurable via validation options
    - Default signed URL expiration is 60 seconds
    - Upload operations support upsert for overwriting existing files
    - All file operations support retry logic with configurable attempts
  anti_patterns:
    - Do not hardcode bucket names in reusable code
    - Do not skip file validation before upload
    - Do not use getPublicUrl for private files (use getSignedUrl instead)
    - Do not leave signed URLs with excessively long expiration times
    - Do not upload files without checking content type
    - Do not delete files without confirming they are no longer needed
dependencies:
  internal:
    - architecture
    - utilities
  external:
    - '@supabase/supabase-js'
code_mapping:
  files:
    - src/lib/storage/operations.ts
    - src/lib/storage/validation.ts
    - src/lib/storage/index.ts
  functions:
    - name: uploadFile
      signature: (bucket: string, path: string, file: File | Blob, options?: UploadOptions) => Promise<UploadResult>
      description: Uploads file with optional progress callback
    - name: uploadWithValidation
      signature: (bucket: string, path: string, file: File | Blob, validator: FileValidator, options?: UploadOptions) => Promise<UploadResult>
      description: Uploads file with custom validation
    - name: uploadImage
      signature: (bucket: string, path: string, file: File | Blob, options?: UploadOptions) => Promise<UploadResult>
      description: Uploads image with type validation
    - name: uploadDocument
      signature: (bucket: string, path: string, file: File | Blob, options?: UploadOptions) => Promise<UploadResult>
      description: Uploads document with type validation
    - name: uploadFromURL
      signature: (bucket: string, path: string, url: string, options?: UploadOptions) => Promise<UploadResult>
      description: Downloads from URL then uploads to storage
    - name: getPublicUrl
      signature: (bucket: string, path: string) => string
      description: Gets permanent public URL for file
    - name: getSignedUrl
      signature: (bucket: string, path: string, expiresIn?: number) => Promise<string>
      description: Gets temporary signed URL (default: 60s)
    - name: downloadFile
      signature: (bucket: string, path: string) => Promise<Blob>
      description: Downloads file as blob
    - name: deleteFile
      signature: (bucket: string, path: string) => Promise<void>
      description: Deletes single file
    - name: deleteFiles
      signature: (bucket: string, paths: string[]) => Promise<void>
      description: Deletes multiple files
    - name: listFiles
      signature: (bucket: string, path?: string) => Promise<StorageObject[]>
      description: Lists files in path
    - name: moveFile
      signature: (bucket: string, fromPath: string, toPath: string) => Promise<{ message: string }>
      description: Moves file to new path
    - name: copyFile
      signature: (bucket: string, fromPath: string, toPath: string) => Promise<{ path: string }>
      description: Copies file to new path
    - name: getFileInfo
      signature: (bucket: string, path: string) => Promise<FileMetadata>
      description: Gets file metadata
    - name: createFolder
      signature: (bucket: string, folderPath: string) => Promise<void>
      description: Creates folder placeholder
    - name: validateFile
      signature: (file: File, options?: { maxSize?: number; allowedTypes?: string[] }) => { isValid: boolean; error?: string }
      description: Validates file size and type
    - name: validateImage
      signature: (file: File) => { isValid: boolean; error?: string }
      description: Validates image (jpeg, png, gif, max 5MB)
    - name: validateDocument
      signature: (file: File) => { isValid: boolean; error?: string }
      description: Validates document (pdf, doc, docx, max 10MB)
ai_instructions:
  when_to_use:
    - When uploading files to Supabase storage buckets
    - When generating signed URLs for temporary file access
    - When validating file types and sizes before upload
    - When managing file lifecycle (upload, download, delete)
    - When implementing progress tracking for large uploads
  when_not_to_use:
    - When storing small amounts of text data (use database instead)
    - When needing relational data storage (use database instead)
    - When file operations require complex business logic (implement separately)
    - When bucket names are hardcoded (use parameterized approach)
  reasoning_steps:
    - Identify target bucket and file path
    - Determine if file validation is needed (type, size)
    - Choose appropriate upload method (basic, validated, image, document)
    - Set progress callback if user feedback is needed
    - Generate appropriate URL type (public vs signed) based on access requirements
    - Handle errors through the typed error system
    - Clean up temporary or unused files
metadata:
  complexity: medium
  stability: stable
