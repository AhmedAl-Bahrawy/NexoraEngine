id: auth
name: Authentication System
category: core
description: Complete authentication system covering client management, email/password auth, OAuth, OTP, MFA, admin operations, and auth middleware for authorization.
intent:
  what: Provides all authentication and authorization capabilities for the Supabase backend template.
  why: Enables secure user management, session handling, multi-factor authentication, and role-based access control without domain-specific assumptions.
inputs:
  - name: credentials
    type: SignInCredentials | SignUpCredentials
    required: true
    description: Email and password for authentication operations
  - name: options
    type: OAuthOptions | AuthMiddlewareOptions | InviteOptions
    required: false
    description: Configuration options for OAuth flows, middleware checks, or admin invites
  - name: mfaParams
    type: object
    required: false
    description: MFA factor ID, verification code, and optional challenge ID
outputs:
  type: AuthResult | AuthContext | User | Session | MFAEnrollResult | MFAVerifyResult | void
  description: Authentication results including user objects, sessions, MFA enrollment data, or authorization context
usage:
  steps:
    - Initialize Supabase client before any auth operations
    - Use signInWithPassword or signUp for email/password flows
    - Use signInWithOTP or signInWithOAuth for alternative auth methods
    - Use enforceAuth or withAuth middleware for protected operations
    - Use MFA operations for enhanced security
    - Use admin operations only on server-side with service role key
  examples:
    - description: Sign in and access protected resource
      code: |
        import { signInWithPassword, enforceAuth, fetchAll } from '@/lib'

        // Authenticate
        const { user, session } = await signInWithPassword({ email, password })

        // Access protected operation
        const ctx = await enforceAuth({ requireRole: 'admin' })
        const data = await fetchAll('sensitive_table', { headers: { Authorization: `Bearer ${session.access_token}` } })
    - description: Wrap handler with auth context
      code: |
        import { withAuth, insertOne } from '@/lib'

        const result = await withAuth(async (ctx) => {
          // ctx.userId, ctx.email, ctx.role available
          return insertOne('posts', { author_id: ctx.userId, content: 'Hello' })
        }, { requireVerifiedEmail: true })
    - description: MFA enrollment and verification flow
      code: |
        import { enrollTOTP, challengeMFA, verifyMFA } from '@/lib'

        // Step 1: Enroll
        const { id, qrCode, secret } = await enrollTOTP('My Device')
        // User scans QR code with authenticator app

        // Step 2: Challenge
        const { id: challengeId } = await challengeMFA(id)

        // Step 3: Verify with TOTP code from app
        const result = await verifyMFA(id, '123456', challengeId)
logic:
  summary: Auth operations flow through the Supabase auth client with retry logic. Middleware validates sessions and roles before allowing protected operations. MFA provides additional security layer. Admin operations require service role key and should only run server-side.
  flow:
    - step: 1
      action: Client retrieval
      detail: getSupabaseClient() returns authenticated Supabase instance
    - step: 2
      action: Auth operation execution
      detail: Supabase auth method called with retry logic via withAuthRetry wrapper
    - step: 3
      action: Error handling
      detail: Errors normalized through handleSupabaseError into AuthError or ValidationError
    - step: 4
      action: Middleware validation
      detail: enforceAuth checks session, user, email verification, roles, and custom checks
    - step: 5
      action: Context injection
      detail: AuthContext with user, session, userId, email, role passed to handler
constraints:
  rules:
    - Admin operations must only run server-side with service role key
    - Password validation requires minimum 6 characters
    - Email format must be validated before auth operations
    - OAuth redirect URLs must be configured in Supabase dashboard
    - MFA enrollment requires active session
    - Auth middleware throws ForbiddenError on authorization failure
  anti_patterns:
    - Do not expose service role key to client-side code
    - Do not store passwords or tokens in plain text
    - Do not skip email validation before auth operations
    - Do not use admin operations in client-facing code
    - Do not bypass auth middleware for protected operations
    - Do not hardcode redirect URLs; use environment-based resolution
dependencies:
  internal:
    - architecture
    - utilities
    - constants
  external:
    - '@supabase/supabase-js'
code_mapping:
  files:
    - src/lib/auth/client.ts
    - src/lib/auth/operations.ts
    - src/lib/auth/mfa.ts
    - src/lib/auth/admin.ts
    - src/lib/auth/middleware.ts
    - src/lib/auth/index.ts
    - src/lib/utils/errors.ts
    - src/lib/utils/retry.ts
    - src/lib/utils/validators.ts
  functions:
    - name: signInWithPassword
      signature: (credentials: SignInCredentials) => Promise<AuthResult>
      description: Authenticates user with email and password
    - name: signUp
      signature: (credentials: SignUpCredentials) => Promise<AuthResult>
      description: Registers new user with email, password, and optional metadata
    - name: signOut
      signature: () => Promise<void>
      description: Ends current session
    - name: signInWithOTP
      signature: (email: string) => Promise<void>
      description: Sends OTP/magic link to email
    - name: signInWithOAuth
      signature: (options: OAuthOptions) => Promise<{ url: string; provider: string }>
      description: Initiates OAuth flow with specified provider
    - name: verifyOTP
      signature: (params: { email: string; token: string; type?: string }) => Promise<AuthResult>
      description: Verifies OTP token for authentication
    - name: resetPassword
      signature: (email: string, redirectTo?: string) => Promise<void>
      description: Sends password reset email
    - name: updatePassword
      signature: (newPassword: string) => Promise<void>
      description: Updates current user password with validation
    - name: updateUser
      signature: (attributes: { email?: string; password?: string; data?: Record<string, unknown> }) => Promise<User>
      description: Updates user profile attributes
    - name: getSession
      signature: () => Promise<Session | null>
      description: Retrieves current session
    - name: getUser
      signature: () => Promise<User | null>
      description: Retrieves current user
    - name: isAuthenticated
      signature: () => Promise<boolean>
      description: Checks if user has active session
    - name: refreshSession
      signature: () => Promise<Session | null>
      description: Refreshes current session token
    - name: onAuthStateChange
      signature: (callback: (event: string, session: Session | null) => void) => Promise<{ unsubscribe: () => void }>
      description: Subscribes to authentication state changes
    - name: enrollTOTP
      signature: (friendlyName?: string) => Promise<MFAEnrollResult>
      description: Enrolls TOTP MFA factor
    - name: challengeMFA
      signature: (factorId: string) => Promise<{ id: string; expires_at: number }>
      description: Creates MFA challenge
    - name: verifyMFA
      signature: (factorId: string, code: string, challengeId?: string) => Promise<MFAVerifyResult>
      description: Verifies MFA code against challenge
    - name: unenrollMFA
      signature: (factorId: string) => Promise<void>
      description: Removes MFA factor
    - name: listMFAFactors
      signature: () => Promise<{ all: Factor[]; totp: Factor[]; phone: Factor[] }>
      description: Lists all enrolled MFA factors
    - name: getAuthenticatorAssuranceLevel
      signature: () => Promise<{ currentLevel: string; nextLevel: string; currentAuthenticationMethods: Array<{ method: string; timestamp: number }> }>
      description: Gets current authenticator assurance level
    - name: createUser
      signature: (params: CreateUserParams) => Promise<User>
      description: Creates user (admin only)
    - name: deleteUser
      signature: (userId: string) => Promise<void>
      description: Deletes user (admin only)
    - name: getUserById
      signature: (userId: string) => Promise<User>
      description: Gets user by ID (admin only)
    - name: listUsers
      signature: (options?: { page?: number; perPage?: number }) => Promise<ListUsersResult>
      description: Lists all users with pagination (admin only)
    - name: updateUserById
      signature: (userId: string, attributes: AdminUpdateParams) => Promise<User>
      description: Updates user by ID (admin only)
    - name: inviteUserByEmail
      signature: (email: string, options?: InviteOptions) => Promise<User>
      description: Invites user via email (admin only)
    - name: generateLink
      signature: (type: string, email: string, options?: GenerateLinkOptions) => Promise<any>
      description: Generates auth link (admin only)
    - name: enforceAuth
      signature: (options?: AuthMiddlewareOptions) => Promise<AuthContext>
      description: Validates authentication and authorization
    - name: requireAuth
      signature: () => Promise<AuthContext>
      description: Requires any authenticated user
    - name: requireRole
      signature: (role: string) => Promise<AuthContext>
      description: Requires specific role
    - name: requireAnyRole
      signature: (roles: string[]) => Promise<AuthContext>
      description: Requires one of multiple roles
    - name: requireVerifiedEmail
      signature: () => Promise<AuthContext>
      description: Requires verified email
    - name: withAuth
      signature: '<T>(handler: (ctx: AuthContext) => Promise<T>, options?: AuthMiddlewareOptions) => Promise<T>'
      description: Wraps handler with auth context
    - name: hasRole
      signature: (user: User, role: string) => boolean
      description: Checks if user has specific role
    - name: hasAnyRole
      signature: (user: User, roles: string[]) => boolean
      description: Checks if user has any of the specified roles
    - name: isAdmin
      signature: (user: User) => boolean
      description: Checks if user has admin role
ai_instructions:
  when_to_use:
    - When implementing user authentication flows
    - When protecting routes or operations with authorization
    - When implementing multi-factor authentication
    - When performing server-side user management
    - When checking user roles or permissions
  when_not_to_use:
    - When performing database CRUD operations (use database skill)
    - When handling file uploads (use storage skill)
    - When implementing caching logic (use cache skill)
    - When client already has valid session (use getSession instead of re-authenticating)
  reasoning_steps:
    - Determine auth method needed (email/password, OTP, OAuth, anonymous)
    - Validate inputs (email format, password strength) before calling auth functions
    - Check if operation requires authentication before executing
    - Use middleware (enforceAuth, withAuth) for protected operations
    - For admin operations, verify service role key is available and server-side context
    - For MFA, follow enrollment → challenge → verification flow
    - Always handle AuthError and ValidationError appropriately
metadata:
  complexity: high
  stability: stable
